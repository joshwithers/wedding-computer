name = "wedding-computer"
main = "src/index.tsx"
compatibility_date = "2025-05-01"
# account_id — set via `wrangler login` or CLOUDFLARE_ACCOUNT_ID env var
workers_dev = true

[assets]
directory = "./public"

[ai]
binding = "AI"

[[send_email]]
name = "SEND_EMAIL"

[[d1_databases]]
binding = "DB"
database_name = "wedding-computer-db"
database_id = "" # create with: wrangler d1 create wedding-computer-db

[[kv_namespaces]]
binding = "KV"
id = "" # create with: wrangler kv namespace create KV

[[queues.producers]]
binding = "EMAIL_QUEUE"
queue = "wedding-computer-emails"

[[queues.consumers]]
queue = "wedding-computer-emails"
max_batch_size = 10
max_retries = 3

[vars]
APP_URL = "https://wedding.computer"
TURNSTILE_SITE_KEY = "0x4AAAAAADVwaAJyPYy65UAp"

[observability.logs]
enabled = true
invocation_logs = true

[triggers]
crons = ["0 20 * * *"]

[[routes]]
pattern = "wedding.computer"
custom_domain = true

[[routes]]
pattern = "www.wedding.computer"
custom_domain = true
