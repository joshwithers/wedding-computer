name = "wedding-computer"
main = "src/index.tsx"
compatibility_date = "2025-05-01"
# AsyncLocalStorage for the per-request i18n context (src/i18n)
compatibility_flags = ["nodejs_als"]
account_id = "56eb0a25e23b5ed8e20b17842ccc14df"
workers_dev = true

[assets]
directory = "./public"

[ai]
binding = "AI"

[[send_email]]
name = "SEND_EMAIL"

[[d1_databases]]
binding = "DB"
database_name = "wedding-computer-db"
database_id = "b20a6a12-b588-4107-9ab1-7eea58fde6d0"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "KV"
id = "c62f7d1f22174f7da3617d1f0257e398"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "wedding-computer-storage"

[[queues.producers]]
binding = "EMAIL_QUEUE"
queue = "wedding-computer-emails"

[[queues.consumers]]
queue = "wedding-computer-emails"
max_batch_size = 10
max_retries = 3
# Exhausted messages land here for inspection instead of vanishing silently.
# Create once with: wrangler queues create wedding-computer-emails-dlq
dead_letter_queue = "wedding-computer-emails-dlq"

[vars]
APP_URL = "https://wedding.computer"
TURNSTILE_SITE_KEY = "0x4AAAAAADVwaAJyPYy65UAp"

[observability.logs]
enabled = true
invocation_logs = true

[triggers]
crons = ["0 20 * * *", "*/5 * * * *"]

[[rules]]
type = "Data"
globs = ["**/*.pdf"]
fallthrough = true

[[routes]]
pattern = "wedding.computer"
custom_domain = true

[[routes]]
pattern = "www.wedding.computer"
custom_domain = true
